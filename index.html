<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Report Warehouse</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:Arial,sans-serif;padding:24px}
.wrap{background:#1a1a1a;color:#e8e8e8;padding:24px;border-radius:10px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.top-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.mc{background:#242424;border:1px solid #333;border-radius:8px;padding:14px 16px}
.mc-label{font-size:11px;color:#888;margin-bottom:6px}
.mc-val{font-size:24px;font-weight:700;color:#fff}
.section-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.cat-title{font-size:10px;font-weight:700;color:#555;letter-spacing:.06em;text-transform:uppercase;margin:10px 0 6px;padding:4px 0;border-bottom:1px solid #2a2a2a}
.split{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start}
.form-panel{background:#242424;border:1px solid #333;border-radius:8px;padding:16px}
.fg{margin-bottom:8px}
.fg label{font-size:11px;color:#888;display:block;margin-bottom:3px;font-weight:600}
.fg input{width:100%;background:#1e1e1e;border:1px solid #444;border-radius:6px;color:#e8e8e8;padding:5px 8px;font-size:13px}
.fg input:focus{outline:none;border-color:#666}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.save-btn{width:100%;padding:9px;background:#3a3a3a;color:#fff;border:1px solid #555;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.save-btn:hover{background:#444}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:11px;text-align:center;margin-top:6px;min-height:14px}
.preview-panel{background:#242424;border:1px solid #333;border-radius:8px;overflow:hidden}
.tabs{display:flex;gap:0;border-bottom:1px solid #333;flex-wrap:wrap}
.tab{padding:9px 14px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:#fff;border-bottom:2px solid #fff}
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #2a2a2a}
.filter-bar label{font-size:11px;color:#888;font-weight:600;white-space:nowrap}
.filter-bar select{background:#1e1e1e;border:1px solid #444;border-radius:6px;color:#e8e8e8;padding:4px 8px;font-size:12px;cursor:pointer}
.filter-bar select:focus{outline:none;border-color:#666}
.filter-count{font-size:11px;color:#555;margin-left:auto}
.tbl-wrap{overflow-x:auto;padding:12px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#2e2e2e;color:#888;font-weight:600;padding:7px;text-align:right;border-bottom:1px solid #333;white-space:nowrap;font-size:10px}
th:first-child{text-align:left}
td{padding:8px 7px;text-align:right;border-bottom:1px solid #2a2a2a;color:#e8e8e8;font-size:11px}
td:first-child{text-align:left;font-weight:600;color:#fff}
tr:last-child td{border-bottom:none}
tr:hover td{background:#2c2c2c}
.chart-area{padding:14px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.chart-card{background:#1e1e1e;border:1px solid #2e2e2e;border-radius:8px;padding:10px}
.chart-card-title{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.chart-group-title{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #2a2a2a}
.chart-card-wrap{position:relative;height:120px}
.chart-section{margin-bottom:18px}
.chart-section-title{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #2a2a2a}
.chart-wrap{position:relative;height:180px}
.chart-wrap-lg{position:relative;height:200px}
.legend{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#aaa}
.dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.empty{text-align:center;padding:2rem;color:#555;font-size:12px}
.divider{border:none;border-top:1px solid #333;margin:10px 0}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:#888;padding:6px 10px;background:#222;border:1px solid #333;border-radius:6px;margin-bottom:14px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:#2ebc8a}
.dot-yellow{background:#d09030;animation:pulse 1.2s ease-in-out infinite}
.dot-red{background:#c04040}
.sync-btn{background:#2a2a2a;color:#aaa;border:1px solid #444;border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer;margin-left:auto}
.sync-btn:hover{background:#333;color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <div class="top-title">Daily Report — Warehouse</div>
    <button class="sync-btn" onclick="syncFromSheet()" id="btn-sync">↻ Refresh from GSheet</button>
  </div>

  <div class="sync-bar">
    <span class="sync-dot dot-yellow" id="sync-dot"></span>
    <span id="sync-msg">Connecting to Google Sheets…</span>
  </div>

  <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
    <span>Today's Report — <span id="today-section-date" style="text-transform:none;font-weight:400"></span></span>
    <button onclick="copyBroadcast()" id="btn-copy" style="background:#2ebc8a;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em">📋 Copy WA Report</button>
  </div>
  <div class="metrics">
    <div class="mc"><div class="mc-label">Machine (Today)</div><div class="mc-val" id="m-wh">—</div></div>
    <div class="mc"><div class="mc-label">PB Warehouse (Today)</div><div class="mc-val" id="m-pbwh">—</div></div>
    <div class="mc"><div class="mc-label">PB Deploy (Today)</div><div class="mc-val" id="m-pbdep">—</div></div>
    <div class="mc"><div class="mc-label">Days Recorded</div><div class="mc-val" id="m-days">0</div></div>
  </div>

  <div class="split">
    <div class="form-panel">
      <div class="section-title">Input Form</div>
      <div class="fg"><label>Date</label><input type="date" id="inp-date"></div>

      <div class="cat-title">⚙️ Machine Count</div>
      <div class="cols2" id="grid-wh"></div>

      <div class="cat-title">📦 Other</div>
      <div class="cols2" id="grid-other"></div>

      <div class="cat-title">🔋 Powerbank WH Stock</div>
      <div class="fg"><label>Quantity</label><input type="number" id="inp-PBWH" min="0" value="0"></div>

      <div class="cat-title">🔋 Powerbank Deploy Stock</div>
      <div class="fg"><label>Quantity</label><input type="number" id="inp-PBDEP" min="0" value="0"></div>

      <hr class="divider">
      <button class="save-btn" onclick="submitForm()" id="btn-submit">💾 Save Data</button>
      <p class="msg" id="form-msg"></p>
    </div>

    <div class="preview-panel">
      <div class="tabs">
        <button class="tab on" onclick="switchTab('table',this)">Data Table</button>
        <button class="tab" onclick="switchTab('chart',this)">Charts</button>
      </div>

      <div id="view-table">
        <div class="filter-bar">
          <label>Filter by month:</label>
          <select id="filter-month" onchange="renderTable()">
            <option value="">All months</option>
          </select>
          <span class="filter-count" id="filter-count"></span>
        </div>
        <div class="tbl-wrap">
          <table id="data-table"><thead></thead><tbody><tr><td colspan="16" class="empty">Loading data…</td></tr></tbody></table>
        </div>
      </div>

      <div id="view-chart" style="display:none" class="chart-area">
        <div class="chart-group-title">⚙️ Machine Count</div>
        <div class="chart-grid" id="chart-grid-machine"></div>
        <div class="chart-group-title" style="margin-top:18px">📦 Other</div>
        <div class="chart-grid" id="chart-grid-other"></div>
        <div class="chart-group-title" style="margin-top:18px">🔋 Powerbank</div>
        <div class="chart-grid" id="chart-grid-pb"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw9Xgz7B0mHgU7kIiXBexbjb0hJJnQOZNGmdZs3tJRMb8_5NnnBKeU5j_IWyjKRyAs_hw/exec';

const CAT_MACHINE = ['Nas8','Nas16','Nas50','Ldx8','Ldx16','Ldx30','Relink','Extention'];
const CAT_OTHER   = ['Standing','TV','Router','Rangka'];
const CAT_WH      = [...CAT_MACHINE, ...CAT_OTHER];
const PAL12   = ['#4e8fd4','#2ebc8a','#e07050','#d46080','#8a8a8a','#80b840','#d09030','#c04040','#7060c0','#3080c0','#608050','#b05030'];
const ALL_COLS = [...CAT_WH, 'PBWH', 'PBDEP'];
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let data = [], isSaving = false, charts = {};

function saveLocal(){ try{ localStorage.setItem('wh_daily_v2', JSON.stringify(data)); }catch(e){} }
function loadLocal(){ return JSON.parse(localStorage.getItem('wh_daily_v2') || 'null'); }

// Selalu pakai waktu Jakarta (UTC+7)
function todayJKT(){
  const now = new Date();
  const jkt = new Date(now.getTime() + (7 * 60 * 60 * 1000));
  return jkt.toISOString().slice(0,10);
}

(function buildForm(){
  document.getElementById('inp-date').value = todayJKT();
  const grid = document.getElementById('grid-wh');
  CAT_MACHINE.forEach(col => {
    const g = document.createElement('div'); g.className = 'fg';
    g.innerHTML = `<label>${col}</label><input type="number" id="inp-${col}" min="0" value="0">`;
    grid.appendChild(g);
  });
  const gridOther = document.getElementById('grid-other');
  CAT_OTHER.forEach(col => {
    const g = document.createElement('div'); g.className = 'fg';
    g.innerHTML = `<label>${col}</label><input type="number" id="inp-${col}" min="0" value="0">`;
    gridOther.appendChild(g);
  });
})();

function setSyncStatus(state, msg){
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot';
  dot.classList.add(state==='ok'?'dot-green':state==='loading'?'dot-yellow':'dot-red');
  document.getElementById('sync-msg').textContent = msg;
}
function nowStr(){ return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }

async function syncFromSheet(){
  setSyncStatus('loading','Fetching data from Google Sheets…');
  document.getElementById('btn-sync').disabled = true;
  try {
    const res  = await fetch(GAS_URL + '?action=getAll');
    const json = await res.json();
    if(json.status==='ok' && Array.isArray(json.data)){
      // FIX: Selalu pakai data dari GSheet, termasuk kalau kosong
      data = json.data;
      saveLocal();
      setSyncStatus('ok','Synced · '+nowStr());
    } else throw new Error(json.message||'Error');
  } catch(e){
    // Fallback ke localStorage hanya kalau koneksi gagal total
    const l = loadLocal(); if(l && l.length) data = l;
    setSyncStatus('red','⚠ Connection failed — showing local data');
  }
  document.getElementById('btn-sync').disabled = false;
  render();
}

async function saveToSheet(row){
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({action:'save', row})
  });
  const json = await res.json();
  if(json.status !== 'ok') throw new Error(json.message||'Save failed');
}

async function submitForm(){
  if(isSaving) return;
  const date = document.getElementById('inp-date').value;
  if(!date){ showMsg('Please select a date!','#c04040'); return; }
  const row = {date};
  CAT_WH.forEach(c => { row[c] = parseInt(document.getElementById('inp-'+c).value)||0; });
  row['PBWH']  = parseInt(document.getElementById('inp-PBWH').value)||0;
  row['PBDEP'] = parseInt(document.getElementById('inp-PBDEP').value)||0;

  isSaving = true;
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Saving…';
  showMsg('Sending to Google Sheets…','#888');

  const idx = data.findIndex(r => parseDate(r.date) === date);
  if(idx >= 0) data[idx] = row; else data.push(row);
  data.sort((a,b) => parseDate(a.date).localeCompare(parseDate(b.date)));
  saveLocal(); render();

  try {
    await saveToSheet(row);
    setSyncStatus('ok','Synced · '+nowStr());
    showMsg('✓ Saved to Google Sheets!','#2ebc8a');
  } catch(e){
    setSyncStatus('red','⚠ Local OK · GSheet failed ('+e.message+')');
    showMsg('⚠ Saved locally, GSheet failed','#d09030');
  }

  ALL_COLS.forEach(c => { const el=document.getElementById('inp-'+c); if(el) el.value=0; });
  btn.disabled = false; btn.textContent = '💾 Save Data';
  isSaving = false;
}

function showMsg(t,c){
  const el = document.getElementById('form-msg');
  el.textContent = t; el.style.color = c;
  if(c === '#2ebc8a') setTimeout(()=>el.textContent='', 2500);
}

function sumCols(r,cols){ return cols.reduce((s,c)=>s+(Number(r[c])||0),0); }

// Normalize tanggal dari GSheet (bisa ISO string atau plain YYYY-MM-DD) ke YYYY-MM-DD Jakarta
function parseDate(d){
  if(!d) return '';
  if(typeof d === 'string' && d.includes('T')){
    // Format ISO dari GSheet: 2026-05-21T17:00:00.000Z → konversi ke Jakarta UTC+7
    const jkt = new Date(new Date(d).getTime() + 7*60*60*1000);
    return jkt.toISOString().slice(0,10);
  }
  // Sudah YYYY-MM-DD
  return String(d).slice(0,10);
}

function fmt(d){
  const clean = parseDate(d);
  if(!clean||!clean.includes('-')) return clean||'';
  const[y,m,day]=clean.split('-');
  return `${parseInt(day)} ${MONTHS_S[parseInt(m)-1]} ${y}`;
}
function monthKey(d){ return parseDate(d).slice(0,7); }
function monthLabel(ym){
  const[y,m]=ym.split('-');
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}

function render(){
  const todayKey = todayJKT();
  const [ty,tm,td] = todayKey.split('-');
  document.getElementById('today-section-date').textContent = `${parseInt(td)} ${MONTHS_S[parseInt(tm)-1]} ${ty}`;
  const todayRow = data.find(r => parseDate(r.date) === todayKey);
  document.getElementById('m-wh').textContent    = todayRow ? sumCols(todayRow, CAT_WH).toLocaleString() : '—';
  document.getElementById('m-pbwh').textContent  = todayRow ? (Number(todayRow['PBWH'])||0).toLocaleString() : '—';
  document.getElementById('m-pbdep').textContent = todayRow ? (Number(todayRow['PBDEP'])||0).toLocaleString() : '—';
  document.getElementById('m-days').textContent  = data.length;
  updateFilterDropdown();
  renderTable();
  const active = document.querySelector('.tab.on');
  if(active && active.textContent.trim()==='Charts'){ renderIndividualCharts(); }
}

function updateFilterDropdown(){
  const sel = document.getElementById('filter-month');
  const cur = sel.value;
  const months = [...new Set(data.map(r=>monthKey(r.date)).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All months</option>' + months.map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join('');
  if(months.includes(cur)) sel.value = cur;
}

function filteredData(){
  const m = document.getElementById('filter-month').value;
  return m ? data.filter(r=>monthKey(r.date)===m) : data;
}

function renderTable(){
  const fd = filteredData();
  const thead = document.querySelector('#data-table thead');
  const tbody = document.querySelector('#data-table tbody');
  document.getElementById('filter-count').textContent = fd.length + ' rows shown';
  thead.innerHTML =
    `<tr>
      <th rowspan="2" style="vertical-align:bottom">Date</th>
      <th colspan="${CAT_MACHINE.length}" style="text-align:center;color:#4e8fd4;border-bottom:1px solid #4e8fd455">Machine Count</th>
      <th colspan="${CAT_OTHER.length}" style="text-align:center;color:#2ebc8a;border-bottom:1px solid #2ebc8a55">Other</th>
      <th rowspan="2" style="vertical-align:bottom">Total Machine</th>
      <th rowspan="2" style="vertical-align:bottom">PB WH</th>
      <th rowspan="2" style="vertical-align:bottom">PB Deploy</th>
    </tr>
    <tr>
      ${CAT_MACHINE.map(l=>`<th>${l}</th>`).join('')}
      ${CAT_OTHER.map(l=>`<th>${l}</th>`).join('')}
    </tr>`;
  if(!fd.length){ tbody.innerHTML=`<tr><td colspan="${CAT_WH.length+4}" class="empty">No data available.</td></tr>`; return; }
  tbody.innerHTML = fd.map(r => {
    const tot = sumCols(r, CAT_WH);
    return `<tr><td>${fmt(r.date)}</td>${CAT_WH.map(c=>`<td>${Number(r[c])||0}</td>`).join('')}<td style="font-weight:700;color:#fff">${tot}</td><td style="color:#f0a030">${Number(r['PBWH'])||0}</td><td style="color:#e06010">${Number(r['PBDEP'])||0}</td></tr>`;
  }).join('');
}

function destroyChart(key){ if(charts[key]){ charts[key].destroy(); delete charts[key]; } }
function mkChart(key,id,type,labels,datasets,opts){ destroyChart(key); charts[key]=new Chart(document.getElementById(id),{type,data:{labels,datasets},options:opts}); }
function barOpts(){ return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:'#888',font:{size:9}},grid:{color:'#2a2a2a'}},y:{stacked:true,ticks:{color:'#888',font:{size:9}},grid:{color:'#2a2a2a'}}}}; }
function lineOpts(showLeg){ return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:!!showLeg,labels:{color:'#aaa',font:{size:10},boxWidth:10}}},scales:{x:{ticks:{color:'#888',font:{size:9}},grid:{color:'#2a2a2a'}},y:{ticks:{color:'#888',font:{size:9}},grid:{color:'#2a2a2a'}}}}; }
function makeLegend(elId,labels,pal){ document.getElementById(elId).innerHTML=labels.map((l,i)=>`<span class="legend-item"><span class="dot" style="background:${pal[i%pal.length]}"></span>${l}</span>`).join(''); }
function makeBarDS(cols,labels,pal){ return cols.map((col,i)=>({label:labels[i],data:data.map(r=>Number(r[col])||0),backgroundColor:pal[i%pal.length]+'cc',borderColor:pal[i%pal.length],borderWidth:1})); }
function makeLineDS(col,label,color){ return {label,data:data.map(r=>Number(r[col])||0),borderColor:color,backgroundColor:color+'30',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:color}; }
function makeLineDSCols(cols,label,color){ return {label,data:data.map(r=>sumCols(r,cols)),borderColor:color,backgroundColor:color+'30',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:color}; }

function singleLineOpts(color){ return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}`}}},scales:{x:{ticks:{color:'#666',font:{size:8},maxRotation:45},grid:{color:'#222'}},y:{ticks:{color:'#666',font:{size:8}},grid:{color:'#222'},beginAtZero:true}}}; }

function buildChartGrid(gridId, cols, palette){
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  cols.forEach((col, i) => {
    const card = document.createElement('div'); card.className = 'chart-card';
    card.innerHTML = `<div class="chart-card-title">${col}</div><div class="chart-card-wrap"><canvas id="chart-ind-${col}"></canvas></div>`;
    grid.appendChild(card);
  });
}

function renderIndividualCharts(){
  if(!data.length) return;
  const labels = data.map(r=>fmt(r.date));

  buildChartGrid('chart-grid-machine', CAT_MACHINE, PAL12);
  buildChartGrid('chart-grid-other', CAT_OTHER, PAL12.slice(8));
  buildChartGrid('chart-grid-pb', ['PBWH','PBDEP'], ['#f0a030','#e06010']);

  CAT_MACHINE.forEach((col,i) => {
    const color = PAL12[i % PAL12.length];
    destroyChart('ind-'+col);
    charts['ind-'+col] = new Chart(document.getElementById('chart-ind-'+col), {
      type:'line', data:{labels, datasets:[{data:data.map(r=>Number(r[col])||0), borderColor:color, backgroundColor:color+'25', fill:true, tension:0.3, pointRadius:2, pointBackgroundColor:color, borderWidth:2}]},
      options: singleLineOpts(color)
    });
  });

  CAT_OTHER.forEach((col,i) => {
    const color = PAL12[(i+8) % PAL12.length];
    destroyChart('ind-'+col);
    charts['ind-'+col] = new Chart(document.getElementById('chart-ind-'+col), {
      type:'line', data:{labels, datasets:[{data:data.map(r=>Number(r[col])||0), borderColor:color, backgroundColor:color+'25', fill:true, tension:0.3, pointRadius:2, pointBackgroundColor:color, borderWidth:2}]},
      options: singleLineOpts(color)
    });
  });

  [['PBWH','#f0a030'],['PBDEP','#e06010']].forEach(([col,color]) => {
    destroyChart('ind-'+col);
    charts['ind-'+col] = new Chart(document.getElementById('chart-ind-'+col), {
      type:'line', data:{labels, datasets:[{data:data.map(r=>Number(r[col])||0), borderColor:color, backgroundColor:color+'25', fill:true, tension:0.3, pointRadius:2, pointBackgroundColor:color, borderWidth:2}]},
      options: singleLineOpts(color)
    });
  });
}

function renderChartsMesin(){ renderIndividualCharts(); }
function renderChartsPB(){}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('view-table').style.display = tab==='table'?'':'none';
  document.getElementById('view-chart').style.display = tab==='chart'?'':'none';
  if(tab==='chart'){ renderIndividualCharts(); }
}

function copyBroadcast(){
  const todayKey = todayJKT();
  const todayRow = data.find(r => parseDate(r.date) === todayKey);
  if(!todayRow){
    alert('Belum ada data untuk hari ini!');
    return;
  }
  const [y,m,d] = todayKey.split('-');
  const dateLabel = `${parseInt(d)} ${MONTHS[parseInt(m)-1]} ${y}`;

  const pad = (str, len) => String(str).padEnd(len);

  let lines = [];
  lines.push(`📦 *DAILY REPORT WAREHOUSE*`);
  lines.push(`📅 ${dateLabel}`);
  lines.push(``);
  lines.push(`⚙️ *Machine Count*`);
  CAT_MACHINE.forEach(col => {
    lines.push(`• ${pad(col, 10)}: ${Number(todayRow[col])||0}`);
  });
  lines.push(`• ${pad('Total', 10)}: ${sumCols(todayRow, CAT_WH)}`);
  lines.push(``);
  lines.push(`📦 *Other*`);
  CAT_OTHER.forEach(col => {
    lines.push(`• ${pad(col, 10)}: ${Number(todayRow[col])||0}`);
  });
  lines.push(``);
  lines.push(`🔋 *Powerbank*`);
  lines.push(`• ${pad('PB WH', 10)}: ${Number(todayRow['PBWH'])||0}`);
  lines.push(`• ${pad('PB Deploy', 10)}: ${Number(todayRow['PBDEP'])||0}`);

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.style.color = '#2ebc8a';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
  }).catch(() => {
    // Fallback kalau clipboard API ga support
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.style.color = '#2ebc8a';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
  });
}

syncFromSheet();
</script>
</body>
</html>
